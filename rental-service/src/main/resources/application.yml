spring:
  application:
    name: rental-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rental_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false             # ← ADD: prevents connection leaks in gRPC/non-web services
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5   # ← FIX: was 1; idempotence allows up to 5
    consumer:
      group-id: rental-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.anor.*"
        spring.json.use.type.headers: false        # ← ADD: avoids ClassNotFound if producers
                                                   #   don't embed type headers in messages

grpc:
  server:
    port: ${GRPC_PORT:9090}
  client:
    station-service:
      address: static://${STATION_GRPC_HOST:localhost}:${STATION_GRPC_PORT:9091}
      negotiation-type: plaintext

kafka:
  topics:
    rental-commands: rental-commands
    payment-requests: payment-requests
    station-events: station-events
    payment-events: payment-events

recurring:
  payment:
    interval-minutes: 60
    cron: "0 0 * * * *"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics